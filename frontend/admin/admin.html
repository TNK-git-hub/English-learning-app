<!-- ========== ADMIN ARTICLES TEMPLATE ========== -->
<template id="admin-articles-template">
    <div class="articles-layout admin-layout">
        <!-- Header Navigation -->
        <header class="main-header">
            <div class="logo">
                <span class="logo-icon"><i class="fa-solid fa-graduation-cap"
                        style="transform: rotate(-45deg);"></i></span>
                LearnUP
            </div>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="admin-articles-search" placeholder="Search articles...">
            </div>
            <nav class="main-nav">
                <a href="#" class="active">Dashboard</a>
            </nav>
            <div class="user-profile-dropdown">
                <div class="user-profile-toggle" title="Account menu">
                    <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0;" title="Admin">
                        <i class="fa-solid fa-user-shield" style="font-size:14px;"></i>
                    </div>
                </div>
                <div class="user-dropdown-menu">
                    <div class="user-dropdown-header">
                        <span class="user-dropdown-name">Admin</span>
                    </div>
                    <a href="#" class="user-dropdown-item" onclick="animateTransition('admin-articles'); return false;">
                        <i class="fa-solid fa-gauge"></i> Dashboard
                    </a>
                    <div class="user-dropdown-divider"></div>
                    <a href="#" class="user-dropdown-item logout-btn">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </a>
                </div>
            </div>
        </header>

        <div class="page-body">
            <!-- Admin Sidebar -->
            <aside class="admin-sidebar">
                <nav class="admin-nav">
                    <a href="#" class="admin-nav-item active" id="nav-admin-articles"><i
                            class="fa-regular fa-file-lines"></i> Articles</a>
                    <a href="#" class="admin-nav-item" id="nav-admin-categories"><i class="fa-solid fa-tags"></i>
                        Categories</a>
                    <a href="#" class="admin-nav-item" id="nav-admin-users"><i class="fa-regular fa-user"></i>
                        Users</a>
                </nav>
            </aside>

            <!-- Admin Content Area -->
            <main class="content-area admin-content">
                <div class="admin-header">
                    <div>
                        <h1>Article Management</h1>
                        <p style="color: #64748b; font-size: 14px; margin-top: 4px;">Manage and curate English
                            learning content.</p>
                    </div>
                    <button class="btn-primary" id="add-new-article-btn"><i class="fa-solid fa-plus"></i> Add New
                        Article</button>
                </div>

                <div class="admin-stats-grid" style="margin-bottom: 24px;">
                    <div class="stat-card">
                        <div class="stat-icon-wrapper text-blue icon-blue-bg"><i class="fa-regular fa-file-lines"></i></div>
                        <div>
                            <span class="stat-title">Total Articles</span>
                            <strong id="admin-stat-total">—</strong>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-wrapper text-green icon-green-bg"><i class="fa-solid fa-tags"></i></div>
                        <div>
                            <span class="stat-title">Categories</span>
                            <strong id="admin-stat-tags">—</strong>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-wrapper text-yellow icon-yellow-bg"><i class="fa-regular fa-calendar"></i></div>
                        <div>
                            <span class="stat-title">Added This Month</span>
                            <strong id="admin-stat-month">—</strong>
                        </div>
                    </div>
                </div>

                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>TITLE</th>
                            <th>CATEGORIES</th>
                            <th>DATE ADDED</th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="admin-articles-tbody">
                        <tr>
                            <td colspan="4"
                                style="text-align: center; padding: 40px; color: #64748b;">
                                <i class="fa-solid fa-spinner fa-spin" style="margin-right: 8px;"></i>Loading...
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div class="table-footer">
                    <span class="showing-text" id="admin-articles-showing">—</span>
                </div>
            </main>
        </div>

        <footer class="full-footer"
            style="margin-top: auto; border-radius: 0; padding: 24px 48px; border-top: 1px solid #e2e8f0;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span class="logo-icon logo-icon-sm" style="margin: 0;"><i class="fa-solid fa-graduation-cap"
                        style="transform: rotate(-45deg);"></i></span>
                <strong style="color: #0f172a;">LearnUP</strong>
            </div>
            <div>© 2026 LearnUP. All rights reserved.</div>
            <div class="footer-links"></div>
        </footer>
    </div>

    <!-- ===== Article Create/Edit Modal ===== -->
    <div class="admin-modal-overlay" id="article-modal-overlay">
        <div class="admin-modal-box">
            <div class="admin-modal-header">
                <h3 id="article-modal-title">Add New Article</h3>
                <button class="admin-modal-close" id="article-modal-close">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="admin-modal-body">
                <input type="hidden" id="article-modal-id">
                <div class="admin-form-group">
                    <label>Title <span class="required">*</span></label>
                    <input type="text" id="article-modal-title-input" placeholder="Enter article title...">
                </div>
                <div class="admin-form-group">
                    <label>Content <span class="required">*</span></label>
                    <textarea id="article-modal-content" rows="8"
                        placeholder="Enter article content..."></textarea>
                </div>
                <div class="admin-form-group">
                    <label>Difficulty</label>
                    <select id="article-modal-difficulty" style="width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;color:#0f172a;background:#fff;">
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                </div>
                <div class="admin-form-group">
                    <label>Article Image</label>
                    <!-- Tab switcher -->
                    <div style="display:flex;gap:0;margin-bottom:10px;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;">
                        <button type="button" class="img-tab-btn active" id="img-tab-url-btn"
                            style="flex:1;padding:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:#eff6ff;color:#2563eb;transition:all .2s;">
                            <i class="fa-solid fa-link" style="margin-right:5px;"></i>URL
                        </button>
                        <button type="button" class="img-tab-btn" id="img-tab-file-btn"
                            style="flex:1;padding:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:#f8fafc;color:#64748b;transition:all .2s;">
                            <i class="fa-solid fa-upload" style="margin-right:5px;"></i>Upload File
                        </button>
                    </div>
                    <!-- URL input -->
                    <div id="img-input-url">
                        <input type="text" id="article-modal-image" placeholder="https://example.com/image.jpg">
                        <p style="font-size:12px;color:#94a3b8;margin-top:5px;">Paste a direct image URL</p>
                    </div>
                    <!-- File upload input -->
                    <div id="img-input-file" style="display:none;">
                        <div id="img-drop-zone" style="border:2px dashed #cbd5e1;border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:border-color .2s;">
                            <i class="fa-solid fa-cloud-arrow-up" style="font-size:28px;color:#94a3b8;margin-bottom:8px;display:block;"></i>
                            <p style="color:#64748b;font-size:14px;margin:0;">Click to browse or drag & drop</p>
                            <p style="color:#94a3b8;font-size:12px;margin:4px 0 0;">PNG, JPG, GIF, WebP, PDF — max 10 MB</p>
                            <input type="file" id="article-modal-file" accept="image/*,.pdf" style="display:none;">
                        </div>
                        <div id="img-upload-progress" style="display:none;margin-top:8px;">
                            <div style="background:#f1f5f9;border-radius:4px;height:6px;overflow:hidden;">
                                <div id="img-progress-bar" style="height:100%;background:#2563eb;width:0%;transition:width .3s;"></div>
                            </div>
                            <p id="img-upload-status" style="font-size:12px;color:#64748b;margin-top:5px;">Uploading...</p>
                        </div>
                        <div id="img-preview" style="display:none;margin-top:10px;">
                            <img id="img-preview-img" src="" alt="Preview" style="max-width:100%;max-height:120px;border-radius:6px;object-fit:cover;border:1px solid #e2e8f0;">
                            <p id="img-preview-name" style="font-size:12px;color:#64748b;margin-top:4px;"></p>
                        </div>
                    </div>
                </div>
                <div class="admin-form-group">
                    <label>Categories (Tags)</label>
                    <div id="article-modal-tags" class="admin-tags-picker">
                        <span style="color: #94a3b8; font-size: 13px;">Loading tags...</span>
                    </div>
                </div>
            </div>
            <div class="admin-modal-footer">
                <button class="btn-outline" id="article-modal-cancel">Cancel</button>
                <button class="btn-primary" id="article-modal-save">
                    <i class="fa-solid fa-floppy-disk"></i> Save Article
                </button>
            </div>
        </div>
    </div>

    <!-- ===== Delete Confirmation Modal ===== -->
    <div class="admin-modal-overlay" id="admin-confirm-overlay">
        <div class="admin-modal-box admin-modal-sm">
            <div class="admin-modal-header">
                <div style="display:flex; align-items:center; gap:10px;">
                    <i class="fa-solid fa-triangle-exclamation" style="color:#ef4444; font-size:20px;"></i>
                    <h3 id="admin-confirm-title">Confirm Delete</h3>
                </div>
            </div>
            <div class="admin-modal-body">
                <p id="admin-confirm-text" style="color:#475569; line-height:1.6;">Are you sure you want to delete
                    this item? This action cannot be undone.</p>
            </div>
            <div class="admin-modal-footer">
                <button class="btn-outline" id="admin-confirm-cancel">Cancel</button>
                <button class="btn-primary btn-danger" id="admin-confirm-ok">Delete</button>
            </div>
        </div>
    </div>
</template>
