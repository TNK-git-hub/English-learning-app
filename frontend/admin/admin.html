<!-- ========== ADMIN ARTICLES TEMPLATE ========== -->
<template id="admin-articles-template">
    <div class="articles-layout admin-layout">
        <!-- Header Navigation (Shared) -->
        <header class="main-header">
            <div class="logo">
                <span class="logo-icon"><i class="fa-solid fa-graduation-cap"
                        style="transform: rotate(-45deg);"></i></span>
                EngVocabLearn
            </div>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search articles or authors...">
            </div>
            <nav class="main-nav">
                <a href="#" id="nav-admin-articles-articles">Articles</a>
                <a href="#" id="nav-admin-articles-library">Library</a>
                <a href="#" id="nav-admin-articles-quiz">Quiz</a>
                <a href="#" class="active" id="nav-admin-articles-dashboard">Dashboard</a>
            </nav>
            <div class="user-profile-dropdown">
                <div class="user-profile-toggle" title="Account menu">
                    <img src="https://i.pravatar.cc/150?img=11" alt="User Avatar">
                </div>
                <div class="user-dropdown-menu">
                    <div class="user-dropdown-header">
                        <span class="user-dropdown-name">User</span>
                    </div>
                    <a href="#" class="user-dropdown-item" onclick="animateTransition('articles'); return false;">
                        <i class="fa-solid fa-newspaper"></i> Articles
                    </a>
                    <div class="user-dropdown-divider"></div>
                    <a href="#" class="user-dropdown-item logout-btn">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </a>
                </div>
            </div>
        </header>

        <div class="page-body">
            <!-- Admin Sidebar -->
            <aside class="admin-sidebar">
                <nav class="admin-nav">
                    <a href="#" class="admin-nav-item active" id="nav-admin-articles"><i
                            class="fa-regular fa-file-lines"></i> Articles</a>
                    <a href="#" class="admin-nav-item" id="nav-admin-categories"><i class="fa-solid fa-layer-group"></i>
                        Categories</a>
                    <a href="#" class="admin-nav-item"><i class="fa-regular fa-user"></i> Users</a>
                    <a href="#" class="admin-nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
                </nav>
                <div class="admin-sidebar-footer">
                    <div class="admin-user-info">
                        <img src="https://i.pravatar.cc/150?img=11" alt="User Avatar">
                        <div style="display: flex; flex-direction: column;">
                            <strong style="font-size: 14px; color: #0f172a;">Alex Johnson</strong>
                            <span style="font-size: 12px; color: #64748b;">Senior Editor</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Admin Content Area -->
            <main class="content-area admin-content">
                <div class="admin-header">
                    <div>
                        <h1>Article Management</h1>
                        <p style="color: #64748b; font-size: 14px; margin-top: 4px;">Manage and curate English
                            learning content for your students.</p>
                    </div>
                    <button class="btn-primary" id="add-new-article-btn"><i class="fa-solid fa-plus"></i> Add New
                        Article</button>
                </div>

                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>TITLE</th>
                            <th>CATEGORY</th>
                            <th>DIFFICULTY</th>
                            <th>STATUS</th>
                            <th>DATE ADDED</th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="admin-articles-tbody">
                        <tr>
                            <td style="color: #0f172a; font-weight: 500;">Mastering Present Perfect</td>
                            <td>Grammar</td>
                            <td><span class="text-gray">Intermediate</span></td>
                            <td><span class="status-badge published"><i class="fa-solid fa-circle"
                                        style="font-size: 6px;"></i> Published</span></td>
                            <td>Oct 24, 2023</td>
                            <td>
                                <button class="action-icon"><i class="fa-solid fa-pen"></i></button>
                                <button class="action-icon text-gray"><i class="fa-regular fa-trash-can"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td style="color: #0f172a; font-weight: 500;">10 Business Idioms to Know</td>
                            <td>Vocabulary</td>
                            <td><span class="text-gray">Advanced</span></td>
                            <td><span class="status-badge pending"><i class="fa-solid fa-circle"
                                        style="font-size: 6px;"></i> Pending</span></td>
                            <td>Oct 26, 2023</td>
                            <td>
                                <button class="action-icon"><i class="fa-solid fa-pen"></i></button>
                                <button class="action-icon text-gray"><i class="fa-regular fa-trash-can"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td style="color: #0f172a; font-weight: 500;">Daily Conversation Guide</td>
                            <td>Speaking</td>
                            <td><span class="text-gray">Beginner</span></td>
                            <td><span class="status-badge draft"><i class="fa-solid fa-circle"
                                        style="font-size: 6px;"></i> Draft</span></td>
                            <td>Oct 27, 2023</td>
                            <td>
                                <button class="action-icon"><i class="fa-solid fa-pen"></i></button>
                                <button class="action-icon text-gray"><i class="fa-regular fa-trash-can"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div class="table-footer">
                    <span class="showing-text">Showing 3 of 24 articles</span>
                    <div class="pagination">
                        <button class="icon-btn"><i class="fa-solid fa-chevron-left"></i></button>
                        <button class="page-btn active">1</button>
                        <button class="page-btn">2</button>
                        <button class="page-btn">3</button>
                        <button class="icon-btn"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>

                <div class="admin-stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon-wrapper text-blue icon-blue-bg"><i class="fa-regular fa-eye"></i>
                        </div>
                        <div>
                            <span class="stat-title">Total Views</span>
                            <strong>12.4k</strong>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-wrapper text-green icon-green-bg"><i
                                class="fa-regular fa-circle-check"></i></div>
                        <div>
                            <span class="stat-title">Published</span>
                            <strong>18</strong>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-wrapper text-yellow icon-yellow-bg"><i class="fa-solid fa-minus"></i>
                        </div>
                        <div>
                            <span class="stat-title">Pending review</span>
                            <strong>4</strong>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <footer class="full-footer"
            style="margin-top: auto; border-radius: 0; padding: 24px 48px; border-top: 1px solid #e2e8f0;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span class="logo-icon logo-icon-sm" style="margin: 0;"><i class="fa-solid fa-graduation-cap"
                        style="transform: rotate(-45deg);"></i></span>
                <strong style="color: #0f172a;">EngVocabLearn</strong>
            </div>
            <div>© 2026 EngVocabLearn. All rights reserved.</div>
            <div class="footer-links"></div>
        </footer>
    </div>
</template>
