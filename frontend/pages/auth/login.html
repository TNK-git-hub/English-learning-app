<template id="login-template">
    <div class="top-bar">
        <div class="logo">
            <span class="logo-icon"><i class="fas fa-graduation-cap"></i></span>
            LearnUP
        </div>
        <div class="top-bar-right">
            <span class="text-gray">Don't have an account?</span>
            <a href="#" class="link-blue" id="go-register">Sign Up</a>
        </div>
    </div>

    <div class="center-content">
        <div class="auth-card">
            <h2>Welcome back</h2>
            <p class="subtitle">Enter your credentials to access your account</p>

            <div class="form-group">
                <label>Email address</label>
                <input type="email" id="login-email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="login-password" placeholder="Enter password">
                    <button class="toggle-pw" id="toggle-login-pw"><i class="far fa-eye"></i></button>
                </div>
            </div>
            <div class="flex-between" style="margin-bottom:20px;">
                <label class="remember-label">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="link-forgot">Forgot password?</a>
            </div>
            <button class="btn-primary" id="login-btn">Sign In</button>

            <div class="divider">
                <span class="divider-line"></span>
                <span class="divider-text">Or continue with</span>
                <span class="divider-line"></span>
            </div>
            <button class="social-btn google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Google
            </button>
            <p class="bottom-link">Don't have an account? <a href="#" id="go-register-bottom">Sign up</a></p>
        </div>
    </div>

    <footer class="full-footer">
        <span>© 2025 LearnUP. All rights reserved.</span>
        <div class="footer-links">
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Contact</a>
        </div>
    </footer>
</template>
