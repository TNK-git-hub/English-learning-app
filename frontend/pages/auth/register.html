<template id="register-template">
    <div class="top-bar">
        <div class="logo">
            <span class="logo-icon"><i class="fa-solid fa-graduation-cap"
                    style="transform: rotate(-45deg);"></i></span>
            LearnUP
        </div>
        <div class="top-bar-right">
            <span class="text-gray">Already have an account?</span>
            <a href="#" id="go-to-login" class="link-blue">Login</a>
        </div>
    </div>
    <div class="center-content" id="register-view" style="background-color: transparent;">
        <h1 class="page-title">Start your journey</h1>
        <p class="page-subtitle">Master English with simple, daily habits.</p>

        <div class="auth-card">
            <div id="register-error-box" style="display: none; background-color: #fce8e8; color: #d93025; padding: 12px; border-radius: 6px; border: 1px solid #fad2d2; margin-bottom: 20px; font-size: 14px; align-items: center; gap: 8px; font-weight: 500;">
                <i class="fas fa-exclamation-circle" style="font-size: 16px;"></i> <span id="register-error-text"></span>
            </div>
            <form id="register-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="reg-name" placeholder="Your full name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="reg-email" placeholder="email@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="reg-password" placeholder="••••••••" required>
                    </div>
                    <p class="hint-text">Must be at least 8 characters long.</p>
                </div>
                <div class="form-group" style="margin-bottom: 24px;">
                    <label>Confirm Password</label>
                    <div class="input-wrapper" id="reg-confirm-wrapper">
                        <input type="password" id="reg-confirm" placeholder="••••••••" required>
                    </div>
                    <p class="error-text" id="reg-confirm-error" style="display: none;"><i
                            class="fa-solid fa-circle-exclamation"></i> Passwords do not match</p>
                </div>

                <button type="submit" class="btn-primary">Register <i class="fa-solid fa-arrow-right"
                        style="margin-left: 8px;"></i></button>
            </form>
        </div>
    </div>
</template>
