        <header class="main-header">

                        style="transform: rotate(-45deg);"></i></span>
                LearnUP
            </div>
            <nav class="main-nav">
                <a href="#" id="nav-quiz-articles">Articles</a>
                <a href="#" id="nav-quiz-library">Library</a>

                    <i class="fas fa-puzzle-piece" style="font-size: 48px; margin-bottom: 16px; display: block;"></i>
