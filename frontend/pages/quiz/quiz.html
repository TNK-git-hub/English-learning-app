<!-- Quiz Template — The learning assessment engine -->
<template id="quiz-template">
    <div class="articles-layout quiz-layout">
        <!-- Header -->
        <header class="main-header">
            <div class="logo" style="cursor: pointer;" id="quiz-to-articles">
                <span class="logo-icon"><i class="fa-solid fa-graduation-cap" style="transform: rotate(-45deg);"></i></span>
                LearnUP
            </div>
            <nav class="main-nav">
                <a href="#" id="nav-quiz-articles">Articles</a>
                <a href="#" id="nav-quiz-library">Library</a>
                <a href="#" class="active" id="nav-quiz-quiz">Quiz</a>
                <a href="#" id="nav-quiz-dashboard">Dashboard</a>
            </nav>
            <div class="user-profile-dropdown">
                <div class="user-profile-toggle">
                    <img src="https://i.pravatar.cc/150?img=11" alt="User Avatar">
                </div>
                <div class="user-dropdown-menu">
                    <div class="user-dropdown-header">
                        <span class="user-dropdown-name">User</span>
                    </div>
                    <a href="#" class="user-dropdown-item" onclick="animateTransition('user-dashboard'); return false;">
                        <i class="fa-solid fa-gauge"></i> Dashboard
                    </a>
                    <div class="user-dropdown-divider"></div>
                    <a href="#" class="user-dropdown-item logout-btn">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </a>
                </div>
            </div>
        </header>

        <!-- Back navigation -->
        <div class="back-nav-bar">
            <button class="back-nav-link" id="quiz-back-to-articles">
                <i class="fa-solid fa-arrow-left"></i> Back to Articles
            </button>
        </div>

        <div class="page-body" style="background-color: #f7f9fc; min-height: calc(100vh - 73px);">
            <main class="quiz-container">
                <!-- State 1: Selection View (Default) -->
                <div id="quiz-view-selection">
                    <div class="section-header" style="margin-bottom: 32px;">
                        <h1 style="font-size: 32px; font-weight: 800; color: #0f172a; letter-spacing: -0.02em;">Knowledge Quizzes</h1>
                        <p style="color: #64748b; font-size: 16px; margin-top: 8px;">Challenge yourself and track your learning progress.</p>
                    </div>

                    <!-- Create Quiz Section -->
                    <div class="quiz-create-section">
                        <div class="quiz-create-card">
                            <div class="quiz-create-icon">
                                <i class="fa-solid fa-plus"></i>
                            </div>
                            <h3 style="font-size: 18px; font-weight: 700; color: #0f172a; margin-bottom: 6px;">Create New Quiz</h3>
                            <p style="font-size: 14px; color: #64748b; margin-bottom: 20px;">Generate a vocabulary quiz from your saved library words.</p>
                            <div class="quiz-create-buttons">
                                <button class="quiz-create-btn" data-count="5">
                                    <i class="fa-solid fa-bolt"></i> 5 Words
                                </button>
                                <button class="quiz-create-btn" data-count="10">
                                    <i class="fa-solid fa-fire"></i> 10 Words
                                </button>
                                <button class="quiz-create-btn" data-count="20">
                                    <i class="fa-solid fa-trophy"></i> 20 Words
                                </button>
                            </div>
                            <p class="quiz-create-error" id="quiz-create-error" style="display: none;"></p>
                        </div>
                    </div>

                    <!-- Generated Quiz Cards -->
                    <div class="quiz-selection-grid" id="quiz-list-container">
                        <!-- Quiz cards will be injected here dynamically -->
                    </div>
                </div>

                <!-- State 2: Active Quiz View (Hidden by default) -->
                <div id="quiz-view-active" style="display: none;">
                    <div class="quiz-active-wrapper">
                        <div class="quiz-progress-header">
                            <div class="quiz-progress-bar">
                                <div class="quiz-progress-fill" id="quiz-progress-fill"></div>
                            </div>
                            <div class="quiz-question-count">Question <span id="current-q-index">1</span> of <span id="total-q-count">10</span></div>
                        </div>

                        <div id="quiz-question-container">
                            <h2 class="quiz-question-text" id="quiz-question-text">Loading question...</h2>
                            <div class="quiz-options-list" id="quiz-options-list">
                                <!-- Options injected here -->
                            </div>

                            <div class="quiz-explanation-box" id="quiz-explanation-box">
                                <div class="explanation-title">
                                    <i class="fa-solid fa-circle-info"></i>
                                    <span>Explanation</span>
                                </div>
                                <div class="explanation-text" id="quiz-explanation-text">
                                    Explanation will appear here.
                                </div>
                            </div>
                        </div>

                        <div class="quiz-footer">
                            <button class="btn-outline" id="quiz-exit-btn">Exit Quiz</button>
                            <button class="btn-primary" id="quiz-next-btn" disabled>Check Answer</button>
                        </div>
                    </div>
                </div>

                <!-- State 3: Result View (Hidden by default) -->
                <div id="quiz-view-result" style="display: none;">
                    <div class="quiz-active-wrapper">
                        <div class="quiz-result-card">
                            <div class="result-score-circle">
                                <svg width="160" height="160" viewBox="0 0 160 160">
                                    <circle cx="80" cy="80" r="70" fill="transparent" stroke="#f1f5f9" stroke-width="12"></circle>
                                    <circle cx="80" cy="80" r="70" fill="transparent" stroke="#3b82f6" stroke-width="12" 
                                            stroke-dasharray="439.8" stroke-dashoffset="439.8" id="result-score-ring"
                                            style="transition: stroke-dashoffset 1.5s ease-out; transform: rotate(-90deg); transform-origin: center;"></circle>
                                </svg>
                                <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                                    <span class="result-score-val" id="result-score-val">0%</span>
                                    <span class="result-score-label">SCORE</span>
                                </div>
                            </div>
                            
                            <h2 class="result-message" id="result-message">Well Done!</h2>
                            <p class="result-sub" id="result-sub">You've completed the quiz. Great effort on your learning journey!</p>
                            
                            <div style="display: flex; justify-content: center; gap: 16px;">
                                <button class="btn-outline" id="result-retry-btn">Try Again</button>
                                <button class="btn-primary" id="result-finish-btn">Finish</button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- Custom Exit Confirmation Modal -->
        <div class="quiz-modal-overlay" id="quiz-exit-modal">
            <div class="quiz-modal">
                <div class="quiz-modal-icon">
                    <i class="fa-solid fa-circle-exclamation"></i>
                </div>
                <h3 class="quiz-modal-title">Exit Quiz?</h3>
                <p class="quiz-modal-text">Your progress in this quiz will be lost. Are you sure you want to leave?</p>
                <div class="quiz-modal-actions">
                    <button class="btn-outline" id="quiz-exit-cancel">Stay & Finish</button>
                    <button class="btn-primary btn-danger" id="quiz-exit-confirm">Yes, Exit</button>
                </div>
            </div>
        </div>
    </div>
</template>
