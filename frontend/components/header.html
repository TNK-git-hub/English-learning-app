<!-- Navigation Header Component -->
<header class="main-header">
    <div class="logo">
        <span class="logo-icon"><i class="fas fa-graduation-cap"></i></span>
        LearnUP
    </div>

    <nav class="main-nav">
        <a href="#" class="nav-link active" data-view="articles">Articles</a>
        <a href="#" class="nav-link" data-view="vocabulary">Vocabulary</a>
        <a href="#" class="nav-link" data-view="quiz">Quiz</a>
    </nav>

    <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="global-search" placeholder="Search articles, vocabulary...">
    </div>

    <div class="header-actions">
        <button class="icon-circle" title="Notifications">
            <i class="far fa-bell"></i>
            <span class="notification-dot"></span>
        </button>
        <div class="user-menu" id="user-menu-btn">
            <img src="https://ui-avatars.com/api/?name=User&background=2563eb&color=fff&size=32" 
                 alt="Avatar" class="user-avatar">
            <div class="user-info">
                <span class="user-name" id="header-user-name">User</span>
                <span class="user-role">Learner</span>
            </div>
        </div>
    </div>
</header>
